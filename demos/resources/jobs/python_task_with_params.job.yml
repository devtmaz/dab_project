resources:
  jobs:
    python_task_with_params_job:
      name: python_task_with_params_job
      tasks:
        - task_key: python_script_task
          spark_python_task:
            python_file: ../../scripts/python_task_with_params.py
            parameters:
              - "{{job.id}}"
              - "{{task.name}}"
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
      tags:
        purpose: demo