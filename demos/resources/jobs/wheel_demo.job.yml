resources:
  jobs:
    wheel_demo_job:
      name: wheel_demo_job
      tasks:
        - task_key: python_script_task
          spark_python_task:
            python_file: ../../scripts/use_wheel_demo.py
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
            # Install the wheel from the dist folder. Python or notebooks that run in this environment
            # could import the modules and packages from the wheel natively.
            dependencies:
              - "../../../dist/*.whl"
      performance_target: PERFORMANCE_OPTIMIZED
      tags:
        purpose: demo